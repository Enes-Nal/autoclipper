<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PasteIt</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1e1e1e;
      color: #f0f0f0;
      font-family: "Adobe Clean", Arial, sans-serif;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 16px;
      gap: 10px;
      overflow: hidden;
      user-select: none;
    }

    #pasteBtn {
      width: 100%;
      padding: 10px 0;
      background: #3d3d3d;
      color: #f0f0f0;
      border: 1px solid #555;
      border-radius: 3px;
      font-size: 13px;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: background 0.1s;
    }

    #pasteBtn:hover  { background: #4d4d4d; }
    #pasteBtn:active { background: #2a2a2a; }
    #pasteBtn:disabled { opacity: 0.5; cursor: default; }

    #status {
      font-size: 11px;
      min-height: 16px;
      color: #aaa;
      text-align: center;
      width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #status.error   { color: #e06c6c; }
    #status.success { color: #88c070; }

    #hint {
      font-size: 10px;
      color: #555;
      text-align: center;
    }
  </style>
</head>
<body>
  <button id="pasteBtn">Paste Image from Clipboard</button>
  <div id="status"></div>
  <div id="hint">Ctrl+V also works when this panel is focused</div>

  <script src="js/CSInterface.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
